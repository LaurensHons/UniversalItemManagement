<div class="pcd">
  <div class="pcd__header">
    <div class="pcd__header-icon">
      <mat-icon>add_circle</mat-icon>
    </div>
    <div>
      <h2 class="pcd__title">New Field Property</h2>
      <p class="pcd__subtitle">Define a reusable field type for your records</p>
    </div>
  </div>

  <mat-dialog-content>
    <app-property-form
      (formValueChange)="onFormChange($event)"
      (validChange)="onValidChange($event)"
    ></app-property-form>
  </mat-dialog-content>

  <div class="pcd__actions">
    <button class="pcd__btn" (click)="onCancel()">Cancel</button>
    <button class="pcd__btn pcd__btn--primary" (click)="onSubmit()" [disabled]="!isFormValid">
      <mat-icon>add</mat-icon>
      Create
    </button>
  </div>
</div>
