<div class="rl">
  <!-- ─── Sidebar ─────────────────────────────────────────────── -->
  <aside class="rl__sidebar">
    <div class="rl__sidebar-header">
      <span class="rl__sidebar-title">Records</span>
      <button
        class="rl__btn rl__btn--terracotta rl__btn--small"
        [routerLink]="'new'"
        matTooltip="Create new record"
      >
        <mat-icon>add</mat-icon>
      </button>
    </div>

    <div class="rl__sidebar-list">
      <a
        *ngFor="let record of records"
        class="rl__sidebar-item"
        [routerLink]="['record', record.id]"
        routerLinkActive="rl__sidebar-item--active"
      >
        <div class="rl__sidebar-item-icon">
          <mat-icon>description</mat-icon>
        </div>
        <div class="rl__sidebar-item-info">
          <span class="rl__sidebar-item-name">{{ record.name }}</span>
          <span class="rl__sidebar-item-meta" *ngIf="record.description">{{ record.description }}</span>
        </div>
      </a>

      <div class="rl__sidebar-empty" *ngIf="!records.length">
        <mat-icon>folder_open</mat-icon>
        <span>No records yet</span>
        <button class="rl__btn rl__btn--small rl__btn--terracotta" [routerLink]="'new'">
          Create one
        </button>
      </div>
    </div>
  </aside>

  <!-- ─── Main Content ────────────────────────────────────────── -->
  <main class="rl__content">
    <router-outlet />
  </main>
</div>
