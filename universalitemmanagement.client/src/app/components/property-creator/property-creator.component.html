<div class="pc">
  <div class="pc__header">
    <div class="pc__header-icon">
      <mat-icon>tune</mat-icon>
    </div>
    <div class="pc__header-text">
      <h2 class="pc__title">Field Properties</h2>
      <p class="pc__subtitle">Define field types that can be used across records</p>
    </div>
  </div>

  <!-- ─── Create Form ────────────────────────────────────────── -->
  <div class="pc__panel">
    <div class="pc__panel-toolbar">
      <span class="pc__panel-label">New Property</span>
    </div>
    <form class="pc__form" [formGroup]="form" (ngSubmit)="createProperty()">
      <mat-form-field appearance="outline" class="no-subscript-wrapper pc__form-field">
        <mat-label>Property Name</mat-label>
        <input matInput formControlName="name" placeholder="e.g., Email, Birth Date, Active" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="no-subscript-wrapper pc__form-field pc__form-field--type">
        <mat-label>Type</mat-label>
        <mat-select formControlName="type">
          <mat-option *ngFor="let type of propertyTypes" [value]="type">
            {{ type }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <button class="pc__btn pc__btn--primary" type="submit">
        <mat-icon>add</mat-icon>
        <span>Add</span>
      </button>
    </form>
  </div>

  <!-- ─── Properties Table ───────────────────────────────────── -->
  <div class="pc__panel" *ngIf="properties.length > 0">
    <div class="pc__panel-toolbar">
      <span class="pc__panel-label">Created Properties</span>
      <span class="pc__panel-count">{{ properties.length }}</span>
    </div>

    <div class="pc__table-wrap">
      <table class="pc__table">
        <thead>
          <tr>
            <th class="pc__th">Name</th>
            <th class="pc__th">Type</th>
            <th class="pc__th pc__th--actions"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="pc__row" *ngFor="let property of properties">
            <td class="pc__td pc__td--name">{{ property.name }}</td>
            <td class="pc__td">
              <span class="pc__badge" [attr.data-type]="property.type.toLowerCase()">
                {{ property.type }}
              </span>
            </td>
            <td class="pc__td pc__td--actions">
              <button
                class="pc__icon-btn pc__icon-btn--danger"
                (click)="deleteProperty(property)"
                matTooltip="Delete property"
              >
                <mat-icon>close</mat-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ─── Empty State ────────────────────────────────────────── -->
  <div class="pc__empty" *ngIf="properties.length === 0">
    <mat-icon>inventory_2</mat-icon>
    <p class="pc__empty-title">No properties yet</p>
    <p class="pc__empty-desc">Use the form above to create your first field property</p>
  </div>
</div>
