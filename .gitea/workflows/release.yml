name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (commit SHA or "latest")'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.MY_GITEA_URL }}
          username: ${{ secrets.MY_GITEA_USER }}
          password: ${{ secrets.MY_GITEA_TOKEN }}

      - name: Deploy
        run: |
          APP_NAME=$(echo "${{ gitea.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr ' _' '--')

          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          echo "GITEA_URL=${{ secrets.MY_GITEA_URL }}" >> .env
          echo "GITEA_OWNER=${{ gitea.repository_owner }}" >> .env
          echo "GITEA_REPO=${{ gitea.event.repository.name }}" >> .env
          echo "IMAGE_TAG=${{ gitea.event.inputs.tag }}" >> .env

          docker network create apps 2>/dev/null || true

          SVC=$(docker compose config --services | head -n1)
          cat > docker-compose.traefik.yml <<TRAEFIKEOF
          services:
            ${SVC}:
              networks:
                - apps
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.${APP_NAME}.rule=Host('${APP_NAME}.laurenshons.com')"
                - "traefik.http.routers.${APP_NAME}.entrypoints=web"
                - "traefik.http.middlewares.${APP_NAME}-strip.stripprefix.prefixes=/${APP_NAME}"
                - "traefik.http.routers.${APP_NAME}.middlewares=${APP_NAME}-strip"
          networks:
            apps:
              external: true
          TRAEFIKEOF

          docker compose -f docker-compose.yml -f docker-compose.traefik.yml pull
          docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
