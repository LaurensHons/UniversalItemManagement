name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (commit SHA or "latest")'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Gitea Container Registry
        run: docker login ${{ vars.MY_GITEA_URL }} -u ${{ secrets.MY_GITEA_USER }} -p ${{ secrets.MY_GITEA_TOKEN }}

      - name: Deploy
        run: |
          APP_NAME=$(echo "${{ gitea.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr ' _' '--')

          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          echo "GITEA_URL=${{ vars.MY_GITEA_URL }}" >> .env
          echo "GITEA_OWNER=$(echo '${{ gitea.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> .env
          echo "GITEA_REPO=$(echo '${{ gitea.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> .env
          echo "IMAGE_TAG=${{ gitea.event.inputs.tag }}" >> .env
          echo "APP_NAME=${APP_NAME}" >> .env

          docker network create apps 2>/dev/null || true
          docker compose pull

      - name: Run database migrations
        run: |
          docker compose up -d db
          docker compose up --wait db
          docker compose run --rm --entrypoint ./efbundle app --connection "Host=db;Port=5432;Database=uim;Username=uim;Password=${{ secrets.DB_PASSWORD }}"

      - name: Start application
        run: docker compose up -d
