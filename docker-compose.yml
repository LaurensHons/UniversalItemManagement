services:
  app:
    image: ${GITEA_URL}/${GITEA_OWNER}/${GITEA_REPO}:${IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      - DB_CONNECTION_STRING=Host=db;Port=5432;Database=uim;Username=uim;Password=${DB_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=uim
      - POSTGRES_USER=uim
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uim"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
