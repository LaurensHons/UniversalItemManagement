services:
  app:
    image: ${GITEA_URL}/${GITEA_OWNER}/${GITEA_REPO}:${IMAGE_TAG:-latest}
    environment:
      - DB_CONNECTION_STRING=Host=db;Port=5432;Database=uim;Username=uim;Password=${DB_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - apps
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`app.laurenshons.com`) && PathPrefix(`/${APP_NAME}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=web"
      - "traefik.http.middlewares.${APP_NAME}-strip.stripprefix.prefixes=/${APP_NAME}"
      - "traefik.http.routers.${APP_NAME}.middlewares=${APP_NAME}-strip"

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=uim
      - POSTGRES_USER=uim
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uim"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

networks:
  apps:
    external: true

volumes:
  pgdata:
